name: Test Check

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets
        env:
          AURORITE_SECRET: totallysecret

      - name: Run test
        run: cargo test --profile test --all-targets --verbose
        env:
          AURORITE_SECRET: totallysecret