name: Rust

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: check if source compiles
        run: cargo check --verbose
        env:
          AURORITE_SECRET: totallysecret

      - name: run tests in test mode
        run: cargo test --profile test
        env:
          AURORITE_SECRET: totallysecret